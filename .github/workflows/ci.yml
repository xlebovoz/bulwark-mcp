name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy (strict)
        run: mypy src/ tests/ tools/

      - name: Pytest
        run: pytest -q

  audit-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit

      - name: Audit installed dependencies
        # Non-zero exit on any *known* CVE in the resolved tree. Override
        # individual advisories with --ignore-vuln if a fix is unavailable.
        # We skip our own (editable, not-yet-on-PyPI) package — auditing
        # deps is the point; auditing ourselves only matters once we
        # publish to PyPI (Week 3+). --strict is dropped because it
        # treats editable packages as collection failures.
        run: pip-audit --skip-editable
