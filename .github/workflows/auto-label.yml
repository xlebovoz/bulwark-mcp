name: Auto-label issues

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    if: vars.MCP_FIREWALL_DISABLE_AUTOLABEL != 'true'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = (context.payload.issue.title || "").toLowerCase();
            const body = (context.payload.issue.body || "").toLowerCase();
            const text = title + "\n" + body;

            const rules = [
              { label: "rule-pack",     match: ["[rule]", "rule pack", "rule-pack", "false positive", "false negative"] },
              { label: "detector",      match: ["[detector]", "detection layer", "rules detector", "llm classifier"] },
              { label: "policy",        match: ["[policy]", "policies.yaml", "policy engine"] },
              { label: "ci",            match: ["[ci]", "github actions", "workflow file"] },
              { label: "docs",          match: ["[docs]", "documentation", "readme"] },
              { label: "performance",   match: ["[perf]", "[performance]", "latency", "p95", "slow"] },
              { label: "security",      match: ["[security]", "vulnerability", "exploit"] },
              { label: "compatibility", match: ["[compat]", "claude desktop", "cursor", "doesn't work with"] },
            ];

            const toAdd = new Set();
            for (const r of rules) {
              if (r.match.some(m => text.includes(m))) toAdd.add(r.label);
            }
            // Sensible default if nothing matched: mark as triage so it surfaces
            // in the maintainer's weekly review.
            if (toAdd.size === 0) toAdd.add("good first issue".replace(" ", " "));

            if (toAdd.size > 0) {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.payload.issue.number,
                labels: Array.from(toAdd),
              });
            }
