name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # required for PyPI OIDC trusted publishing

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    if: vars.MCP_FIREWALL_DISABLE_PUBLISH != 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Verify tag matches pyproject version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF##*/v}"
          ver=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag does not match pyproject version $ver"
            exit 1
          fi

      - name: Build distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Upload to PyPI (trusted)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Trusted publishing: PyPI side configures the project to accept
      # this exact (owner, repo, workflow, environment). No PYPI_TOKEN.
      - uses: pypa/gh-action-pypi-publish@release/v1
