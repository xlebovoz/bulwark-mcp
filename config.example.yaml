# mcp-firewall — example configuration
#
# This file is OPTIONAL. Every value here can also be set via CLI flag
# or env var. Precedence (high → low):
#   1. CLI flag                   (--db-path /tmp/x.db)
#   2. environment variable       (MCP_FIREWALL_DB=/tmp/x.db)
#   3. config file (this file)    (storage.db_path: /tmp/x.db)
#   4. built-in default

# --- Storage --------------------------------------------------------------
storage:
  # Where the audit log lives. Default: <project>/data/log.db
  # Override with MCP_FIREWALL_DB.
  db_path: "data/log.db"
  # Max in-memory queue before we start dropping events with a warning.
  queue_max: 10000
  # Flush batch size / interval.
  batch_size: 100
  batch_interval_ms: 50

# --- Logging --------------------------------------------------------------
logging:
  # Where mcp-firewall's OWN diagnostics go (NOT the audit log).
  # stderr | <path>
  # We never log to stdout because that channel is reserved for JSON-RPC frames
  # going back to the client.
  destination: "stderr"
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR

# --- Detector (Week 2) ----------------------------------------------------
# Off by default — Week 1 users keep their latency profile until they opt
# in. Once enabled, every JSON-RPC frame goes through the cascade in
# ADR-0004 §2.
detector:
  enabled: false                    # set to true to turn the firewall on
  # rules_dir: "/etc/mcp-firewall/rules"   # default: package's built-in pack
  # policies_file: "/etc/mcp-firewall/policies.yaml"   # default: built-in policy
  max_latency_ms: 200               # soft budget; hard abort at 1.25× this
  short_circuit_threshold: 0.9      # rules score ≥ this skips the LLM

  llm:
    enabled: true                   # set to false for rules-only mode
    backend: "ollama"
    url: "http://localhost:11434"
    model: "qwen2.5:3b"
    timeout_ms: 1000                # per-request timeout
    cache_ttl_s: 86400              # SHA-256 verdict cache TTL
    circuit_threshold: 3            # consecutive failures to open the breaker
    circuit_open_s: 60              # how long the breaker stays open
